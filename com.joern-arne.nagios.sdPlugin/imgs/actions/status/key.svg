<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e291b"/>
      <stop offset="100%" stop-color="#0b0f0a"/>
    </radialGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle Radar Line Gradient -->
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="72" height="72" rx="14" fill="url(#bgGrad)"/>
  
  <!-- Subtle circular grid -->
  <circle cx="36" cy="30" r="22" fill="none" stroke="#22c55e" stroke-width="0.75" stroke-opacity="0.15"/>
  <circle cx="36" cy="30" r="15" fill="none" stroke="#22c55e" stroke-width="0.75" stroke-opacity="0.25"/>
  <circle cx="36" cy="30" r="8" fill="none" stroke="#22c55e" stroke-width="0.75" stroke-opacity="0.35"/>
  
  <!-- Crosshair ticks -->
  <line x1="36" y1="5" x2="36" y2="7" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="36" y1="53" x2="36" y2="55" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="11" y1="30" x2="13" y2="30" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="59" y1="30" x2="61" y2="30" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Radar sweep -->
  <path d="M36 30 L51.5 14.5 A22 22 0 0 0 36 8 Z" fill="url(#sweepGrad)" opacity="0.3"/>

  <!-- Outer glowing ring -->
  <circle cx="36" cy="30" r="22" fill="none" stroke="#4ade80" stroke-width="1.5" filter="url(#glow)"/>
  
  <!-- Center dot -->
  <circle cx="36" cy="30" r="2" fill="#4ade80" filter="url(#glow)"/>

  <!-- Pulse Wave -->
  <path d="M18 30h10l2-4 2 8 2-6 2 2h18" fill="none" stroke="#4ade80" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Text -->
  <text x="36" y="62" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="7" font-weight="bold" fill="#a7f3d0" text-anchor="middle" letter-spacing="1">NAGIOS</text>
</svg>
