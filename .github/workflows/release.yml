name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack plugin
        run: npx @elgato/cli pack com.joern-arne.nagios.sdPlugin --force

      - name: Extract release notes
        run: |
          TAG="${{ github.ref_name }}"
          THREE_PART=$(echo "$TAG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          awk -v version="$THREE_PART" '
            BEGIN { gsub(/\./, "\\.", version); pat = "^## \\[" version "\\]" }
            $0 ~ pat  { found=1; next }
            found && /^---$/  { exit }
            found && /^## \[/ { exit }
            found { print }
          ' releasenotes.md > release_notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          THREE_PART=$(echo "${{ github.ref_name }}" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          gh release create "${{ github.ref_name }}" \
            com.joern-arne.nagios.streamDeckPlugin \
            --title "Nagios Stream Deck Plugin ${THREE_PART}" \
            --notes-file release_notes.md
